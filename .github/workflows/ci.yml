name: CI – Tests & Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run pytest tests/ -v

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
      - run: pip install semgrep && semgrep scan --config=auto --config p/python --config p/owasp-top-ten
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync && uv run pip-audit
