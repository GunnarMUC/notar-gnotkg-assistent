name: CI – Tests & Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run pytest tests/ -v

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2

      - name: Semgrep
        continue-on-error: true
        run: |
          pip install semgrep
          semgrep scan --config=auto --config p/python --config p/owasp-top-ten --error

      - name: pip-audit
        continue-on-error: true
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Run pip-audit
        continue-on-error: true
        run: |
          uv sync
          uv run pip-audit
