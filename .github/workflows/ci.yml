name: CI – Tests & Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - name: Format check
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy core ui app.py tests --ignore-missing-imports
      - name: Tests with coverage
        run: uv run pytest tests/ -v --cov --cov-fail-under=80

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2

      - name: Semgrep
        run: |
          pip install semgrep
          semgrep scan --config=auto --config p/python --config p/owasp-top-ten --error

      - name: pip-audit
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Run pip-audit
        run: |
          uv sync
          uv run pip-audit

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run pytest tests/ -v
